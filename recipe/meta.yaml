{% set version = "1.2.8" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-leaflegend
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/leaflegend_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/leaflegend/leaflegend_{{ version }}.tar.gz
  sha256: 6902a7aa9df4bbea7026225171e71105f1c8aac2ff43a0fcc42c03713cd505de

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-base64enc
    - r-htmltools
    - r-htmlwidgets
    - r-leaflet
  run:
    - r-base
    - r-base64enc
    - r-htmltools
    - r-htmlwidgets
    - r-leaflet

test:
  commands:
    - $R -e "library('leaflegend')"           # [not win]
    - "\"%R%\" -e \"library('leaflegend')\""  # [win]

about:
  home: https://leaflegend.delveds.com, https://github.com/tomroh/leaflegend
  license: MIT
  summary: Provides extensions to the 'leaflet' package to customize legends with images, text styling, orientation, sizing, and symbology and functions to create symbols to plot on maps.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
